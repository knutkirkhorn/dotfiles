name: CI
on:
  - push
  - pull_request
jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shell lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Bash syntax check
        run: |
          files=(
            ".aliases"
            ".bash_profile"
            ".functions"
            "bootstrap.sh"
            "brew-update.sh"
            "macos.sh"
            "npm/npm.sh"
            "npm/npm-security-hardening.sh"
            "tests/test-base64decode.sh"
            "tests/test-npm-security-hardening-ignore-scripts.sh"
            "tests/test-open-gitlab-pr.sh"
          )
          for file in "${files[@]}"; do
            bash -n "$file"
          done
      - name: ShellCheck
        # TODO: fix these disabled shellcheck errors later
        run: |
          shellcheck -e SC1090,SC2198,SC2005 \
            .aliases \
            .bash_profile \
            .functions \
            bootstrap.sh \
            brew-update.sh \
            macos.sh \
            npm/npm.sh \
            npm/npm-security-hardening.sh \
            tests/test-base64decode.sh \
            tests/test-npm-security-hardening-ignore-scripts.sh \
            tests/test-open-gitlab-pr.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install package managers
        run: npm install -g pnpm yarn bun
      - name: Run tests
        run: |
          bash tests/test-open-gitlab-pr.sh
          bash tests/test-base64decode.sh
          bash tests/test-npm-security-hardening-ignore-scripts.sh

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun ci
      - run: bun lint
      - run: bun format:check
